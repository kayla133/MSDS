<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formula One Drivers</title>
    <link rel="stylesheet" href="sub.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="script.js" defer></script>
</head>

<body>
    <!-- Header Section -->
    <header>
        <div class="header">
            <div class="logo">
                <a href="index.html">
                    <img src="images/logo.png" alt="MSDI Motorsport Logo">
                </a>
            </div>
            <h1>Formula One Drivers</h1>
            <div class="burger">
                <button class="menu-button" id="burger-btn" aria-label="Menu">☰</button>
                <nav class="burger-nav" id="burger-nav">
                    <ul id="nav-list">
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <!-- Search Section -->
    <section class="search-section">
        <input type="text" id="driver-search" class="search-bar" placeholder="Search drivers..." aria-label="Search drivers">
        <button class="search-button" id="search-btn" aria-label="Submit search">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </section>

    <!-- Main Content -->
    <main>
        <!-- Drivers Container — populated dynamically by script.js -->
        <div class="drivers-container" id="drivers-container">
        </div>
    </main>

</body>

</html>
